name: VFS Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      TARGET_URL: "https://example.com"
      CHECK_TEXT: "Example Domain"

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: requests kur
        run: pip install requests

      - name: Botu çalıştır
        run: python bot.py
